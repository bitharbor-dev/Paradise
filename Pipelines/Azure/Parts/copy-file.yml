parameters:
  - name: displayName
    displayName: 'Template display name'
    type: string
    default: ''

  - name: source
    displayName: 'Source directory'
    type: string
    default: ''

  - name: destination
    displayName: 'Destination path'
    type: string
    default: ''

steps:

- task: PowerShell@2
  displayName: '${{ parameters.displayName }}'
  inputs:
    filePath: 'Pipelines\Scripts\copy-file.ps1'
    arguments: >
      -Source "${{ parameters.source }}"
      -Destination "${{ parameters.destination }}"