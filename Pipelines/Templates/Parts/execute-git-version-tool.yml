steps:

- task: gitversion-setup@4.4.2
  displayName: 'Setup GitVersion'
  inputs:
    versionSpec: '6.6.x'

- task: gitversion-execute@4.4.2
  displayName: 'Run GitVersion'

- task: PowerShell@2
  displayName: 'Update Directory.Build.props with GitVersion output'
  inputs:
    pwsh: true
    workingDirectory: '$(Build.SourcesDirectory)'
    filePath: 'Pipelines\Scripts\UpdatePropsFileVersionInfo.ps1'