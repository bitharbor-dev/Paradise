trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:

  - group: 'maintenance-main'

  - name: 'buildConfiguration'
    value: 'Debug'
    readonly: true

steps:

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    arguments: --configuration $(buildConfiguration)

- task: DotNetCoreCLI@2
  displayName: 'Run tests'
  inputs:
    command: 'test'
    arguments: --collect:"Code Coverage"

- task: DotNetCoreCLI@2
  displayName: 'Publish Web API project'
  inputs:
    command: 'publish'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    modifyOutputPath: true
    zipAfterPublish: true
    publishWebProjects: false
    projects: '**/*.WebApi.csproj'

- task: PublishBuildArtifacts@1
  displayName: 'Upload Web API build'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'WebApi'
    publishLocation: 'Container'

- task: Docker@2
  displayName: 'Build and upload Maintenance project'
  inputs:
    containerRegistry: '$(containerRegistry_ConnecitonName)'
    repository: '$(containerRegistry_RepositoryName)'
    command: 'buildAndPush'
    Dockerfile: '**/*.Maintenance/Dockerfile'
    buildContext: '.'
    tags: