<body style="font-family:Verdana">

    <h1 style="font-size:36px;text-align:center">Password reset</h1>

    <div style="text-align:center;margin:50px">
        <span style="font-size:18px">
            You received this email because there was a password reset request submitted. Use the following token to reset your password:
        </span>
    </div>

    <div style="text-align:center">
        <span style="border:solid #3a86e0;border-radius:4px;font-size:12px;padding:8px 32px;text-decoration:none;display:inline-block">
            {parameter}0
        </span>
    </div>

    <div style="text-align:center;margin:50px">
        <span style="font-size:14px">
            <b>If You did not submit this request, please change Your password as soon as possible and contact our customer support.</b>
        </span>
    </div>

</body>
