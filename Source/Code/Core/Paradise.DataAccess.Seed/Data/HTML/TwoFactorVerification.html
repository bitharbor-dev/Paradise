<html>
<body style="margin:0;background:#f1f5f9;font-family:-apple-system,system-ui,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
        <tr>
            <td align="center">

                <table role="presentation" width="420" cellpadding="0" cellspacing="0"
                       style="background:#ffffff;border-radius:16px;padding:40px;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);">

                    <tr>
                        <td align="center" style="font-size:24px;font-weight:600;color:#1e293b;">
                            New login confirmation
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding-top:10px;color:#64748b;font-size:14px;">
                            A new login attempt was detected. Use the verification code below.
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding-top:30px;font-size:22px;font-weight:700;color:#2563eb;">
                            {parameter}0
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding-top:30px;font-size:13px;color:#64748b;">
                            If you did not attempt to sign in, change your password immediately and contact support.
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>
</body>
</html>
